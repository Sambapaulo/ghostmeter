<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GhostMeter Icon Preview</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }
    
    h1 {
      color: white;
      margin-bottom: 10px;
    }
    
    .subtitle {
      color: #888;
      margin-bottom: 40px;
    }
    
    .preview-container {
      display: flex;
      gap: 40px;
      align-items: flex-end;
      flex-wrap: wrap;
      justify-content: center;
    }
    
    .icon-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    
    .icon-box img {
      border-radius: 20%;
    }
    
    .icon-box span {
      color: #888;
      font-size: 14px;
    }
    
    .specs {
      margin-top: 40px;
      background: #1a1a1a;
      padding: 20px 40px;
      border-radius: 12px;
      color: #ccc;
    }
    
    .specs h3 {
      color: #a855f7;
      margin-top: 0;
    }
    
    .specs ul {
      margin: 0;
      padding-left: 20px;
    }
    
    .specs li {
      margin: 5px 0;
    }
  </style>
</head>
<body>
  <h1>👻 GhostMeter APK Icon</h1>
  <p class="subtitle">Preview before push</p>
  
  <div class="preview-container">
    <div class="icon-box">
      <img src="ghost_icon_preview.png" width="512" height="512" alt="Icon 512x512">
      <span>512 × 512</span>
    </div>
    <div class="icon-box">
      <img src="ghost_icon_preview.png" width="192" height="192" alt="Icon 192x192">
      <span>192 × 192</span>
    </div>
    <div class="icon-box">
      <img src="ghost_icon_preview.png" width="128" height="128" alt="Icon 128x128">
      <span>128 × 128</span>
    </div>
    <div class="icon-box">
      <img src="ghost_icon_preview.png" width="72" height="72" alt="Icon 72x72">
      <span>72 × 72</span>
    </div>
    <div class="icon-box">
      <img src="ghost_icon_preview.png" width="48" height="48" alt="Icon 48x48">
      <span>48 × 48</span>
    </div>
  </div>
  
  <div class="specs">
    <h3>Icon Specifications</h3>
    <ul>
      <li><strong>Background:</strong> Violet #1a0a2e</li>
      <li><strong>Ghost:</strong> White with wavy bottom</li>
      <li><strong>Eyes:</strong> Black ovals</li>
      <li><strong>Mouth:</strong> Open with red tongue sticking out</li>
      <li><strong>No cheeks</strong> (removed)</li>
      <li><strong>Size:</strong> 1024 × 1024 px</li>
    </ul>
  </div>
</body>
</html>
