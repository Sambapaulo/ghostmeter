<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, height=1920, initial-scale=1.0">
  <title>GhostMeter - Video 5</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a0a2e;
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      width: 1080px;
      height: 1920px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(50px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.5); } to { opacity: 1; transform: scale(1); } }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
    @keyframes glow { 0%, 100% { filter: drop-shadow(0 0 30px rgba(168, 85, 247, 0.6)); } 50% { filter: drop-shadow(0 0 60px rgba(168, 85, 247, 1)); } }
    @keyframes surprise { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }
    @keyframes secret { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .anim-fade { animation: fadeIn 0.8s ease-out forwards; }
    .anim-scale { animation: scaleIn 0.6s ease-out forwards; }
    .anim-pulse { animation: pulse 1.5s ease-in-out infinite; }
    .anim-glow { animation: glow 1.5s ease-in-out infinite; }
    .anim-surprise { animation: surprise 0.5s ease-out; }
    .anim-secret { animation: secret 2s ease-in-out infinite; }
    .hidden { opacity: 0; }
    .screen { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px; text-align: center; }
    .hook { font-size: 64px; font-weight: bold; line-height: 1.3; }
    .text-highlight { color: #a855f7; }
    .cta-btn { background: linear-gradient(135deg, #a855f7, #7c3aed); color: white; padding: 40px 60px; border-radius: 50px; font-size: 36px; font-weight: bold; }
    .test-card { background: #2d1b4e; border: 4px solid #4c1d95; border-radius: 30px; padding: 30px; width: 600px; }
  </style>
</head>
<body>

<div class="screen" id="s1">
  <div id="lock" class="hidden anim-scale anim-secret" style="font-size: 150px; margin-bottom: 30px;">🔒</div>
  <h1 id="hook" class="hook hidden">J'ai trouve une app que <span class="text-highlight">personne connait</span>...</h1>
</div>

<div class="screen" id="s2" style="display: none;">
  <div id="ghost" class="hidden anim-scale anim-glow" style="font-size: 150px; margin-bottom: 40px;">👻</div>
  <p id="text1" class="hidden anim-fade" style="font-size: 48px; color: #9ca3af;">Decouverte naturelle...</p>
</div>

<div class="screen" id="s3" style="display: none;">
  <h2 id="test" class="hidden anim-fade" style="font-size: 52px; margin-bottom: 40px;">Test image complexe</h2>
  <div class="test-card">
    <p id="ticket" class="hidden anim-fade" style="font-size: 28px; text-align: left; color: #d1d5db;">
      🎫 TICKET RESTAURANT<br>
      -------------------<br>
      Menu: 24.90€<br>
      Vin: 12.00€<br>
      Total: 36.90€
    </p>
  </div>
</div>

<div class="screen" id="s4" style="display: none;">
  <div id="ghost2" class="hidden anim-scale anim-glow" style="font-size: 150px; margin-bottom: 40px;">👻</div>
  <div id="check" class="hidden anim-surprise" style="font-size: 100px; margin-bottom: 30px;">✅</div>
  <p id="result" class="hidden anim-fade" style="font-size: 56px; font-weight: bold;">OK... ca marche vraiment</p>
</div>

<div class="screen" id="s5" style="display: none;">
  <div id="fire" class="hidden anim-scale" style="font-size: 100px; margin-bottom: 20px;">🔥</div>
  <h2 id="underrated" class="hidden anim-fade" style="font-size: 72px; color: #a855f7; margin-bottom: 40px;">Sous-cote</h2>
</div>

<div class="screen" id="s6" style="display: none;">
  <div id="ghost3" class="hidden anim-scale anim-pulse" style="font-size: 150px; margin-bottom: 60px;">👻</div>
  <h1 id="app" class="hidden anim-fade" style="font-size: 80px; font-weight: bold; margin-bottom: 40px;">GhostMeter</h1>
  <div id="cta" class="hidden cta-btn anim-pulse">Avant que ca devienne viral →</div>
</div>

<script>
function show(id, anim) {
  var el = document.getElementById(id);
  el.classList.remove('hidden');
  if (anim) el.classList.add(anim);
}

function go(n) {
  for (var i = 1; i <= 6; i++) {
    document.getElementById('s' + i).style.display = i === n ? 'flex' : 'none';
  }
}

setTimeout(function() { show('lock', 'anim-scale'); }, 300);
setTimeout(function() { show('hook', 'anim-fade'); }, 800);
setTimeout(function() { go(2); show('ghost', 'anim-scale'); }, 4000);
setTimeout(function() { show('text1', 'anim-fade'); }, 4500);
setTimeout(function() { go(3); show('test', 'anim-fade'); }, 6500);
setTimeout(function() { show('ticket', 'anim-fade'); }, 7000);
setTimeout(function() { go(4); show('ghost2', 'anim-scale'); }, 9500);
setTimeout(function() { show('check', 'anim-surprise'); }, 10000);
setTimeout(function() { show('result', 'anim-fade'); }, 10500);
setTimeout(function() { go(5); show('fire', 'anim-scale'); }, 12500);
setTimeout(function() { show('underrated', 'anim-fade'); }, 13000);
setTimeout(function() { go(6); show('ghost3', 'anim-scale'); }, 15000);
setTimeout(function() { show('app', 'anim-fade'); }, 15500);
setTimeout(function() { show('cta', 'anim-pulse'); }, 16000);
</script>
</body>
</html>
