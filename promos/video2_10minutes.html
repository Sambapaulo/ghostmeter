<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, height=1920, initial-scale=1.0">
  <title>GhostMeter - Video 2</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a0a2e;
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      width: 1080px;
      height: 1920px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(50px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.5); } to { opacity: 1; transform: scale(1); } }
    @keyframes shake { 0%, 100% { transform: translateX(0); } 10%, 30%, 50%, 70%, 90% { transform: translateX(-10px); } 20%, 40%, 60%, 80% { transform: translateX(10px); } }
    @keyframes writing { from { width: 0; } to { width: 100%; } }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
    @keyframes glow { 0%, 100% { filter: drop-shadow(0 0 30px rgba(168, 85, 247, 0.6)); } 50% { filter: drop-shadow(0 0 60px rgba(168, 85, 247, 1)); } }
    .anim-fade { animation: fadeIn 0.8s ease-out forwards; }
    .anim-scale { animation: scaleIn 0.6s ease-out forwards; }
    .anim-shake { animation: shake 0.5s ease-in-out; }
    .anim-pulse { animation: pulse 1.5s ease-in-out infinite; }
    .anim-glow { animation: glow 1.5s ease-in-out infinite; }
    .hidden { opacity: 0; }
    .screen { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px; text-align: center; }
    .hook { font-size: 68px; font-weight: bold; line-height: 1.3; }
    .emoji-big { font-size: 180px; }
    .text-highlight { color: #a855f7; }
    .cta-btn { background: linear-gradient(135deg, #a855f7, #7c3aed); color: white; padding: 40px 80px; border-radius: 50px; font-size: 42px; font-weight: bold; }
    .writing-pad { background: white; border-radius: 20px; width: 600px; height: 400px; padding: 40px; }
  </style>
</head>
<body>

<div class="screen" id="s1">
  <div id="ghost" class="hidden anim-scale" style="font-size: 120px; margin-bottom: 30px;">👻</div>
  <h1 id="hook" class="hook hidden">Je viens de gagner <span class="text-highlight">10 minutes</span> grace a ca...</h1>
</div>

<div class="screen" id="s2" style="display: none;">
  <div id="emoji" class="hidden emoji-big anim-shake" style="margin-bottom: 40px;">😩</div>
  <p id="text" class="hidden anim-fade" style="font-size: 48px; color: #9ca3af;">Recopier a la main...</p>
  <div id="pad" class="hidden writing-pad" style="margin-top: 40px;">
    <p style="color: #333; font-size: 28px; font-family: monospace;">Lorem ipsum dolor sit amet...</p>
  </div>
</div>

<div class="screen" id="s3" style="display: none;">
  <div id="stop" class="hidden anim-scale" style="font-size: 120px; margin-bottom: 30px;">✋</div>
  <h2 id="wait" class="hidden anim-fade" style="font-size: 80px; font-weight: bold;">Attends...</h2>
</div>

<div class="screen" id="s4" style="display: none;">
  <div id="ghost2" class="hidden anim-scale anim-glow" style="font-size: 150px; margin-bottom: 40px;">👻</div>
  <h2 id="scan" class="hidden anim-fade" style="font-size: 56px; margin-bottom: 20px;">Scan → Texte extrait</h2>
  <p id="result" class="hidden anim-fade" style="font-size: 48px; color: #a855f7;">Pourquoi j'ai pas utilise ca avant 😭</p>
</div>

<div class="screen" id="s5" style="display: none;">
  <div id="ghost3" class="hidden anim-scale anim-pulse" style="font-size: 150px; margin-bottom: 60px;">👻</div>
  <h1 id="app" class="hidden anim-fade" style="font-size: 80px; font-weight: bold; margin-bottom: 40px;">GhostMeter</h1>
  <div id="cta" class="hidden cta-btn anim-pulse">Teste →</div>
</div>

<script>
function show(id, anim) {
  var el = document.getElementById(id);
  el.classList.remove('hidden');
  if (anim) el.classList.add(anim);
}

function go(n) {
  for (var i = 1; i <= 5; i++) {
    document.getElementById('s' + i).style.display = i === n ? 'flex' : 'none';
  }
}

setTimeout(function() { show('ghost', 'anim-scale'); }, 300);
setTimeout(function() { show('hook', 'anim-fade'); }, 800);
setTimeout(function() { go(2); show('emoji', 'anim-shake'); }, 3500);
setTimeout(function() { show('text', 'anim-fade'); }, 4000);
setTimeout(function() { show('pad', 'anim-fade'); }, 4500);
setTimeout(function() { go(3); show('stop', 'anim-scale'); }, 7000);
setTimeout(function() { show('wait', 'anim-fade'); }, 7500);
setTimeout(function() { go(4); show('ghost2', 'anim-scale'); }, 9000);
setTimeout(function() { show('scan', 'anim-fade'); }, 9500);
setTimeout(function() { show('result', 'anim-fade'); }, 10000);
setTimeout(function() { go(5); show('ghost3', 'anim-scale'); }, 12500);
setTimeout(function() { show('app', 'anim-fade'); }, 13000);
setTimeout(function() { show('cta', 'anim-pulse'); }, 13500);
</script>
</body>
</html>
