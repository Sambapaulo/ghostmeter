<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GhostMeter - Coach Relationnel</title>
    <meta http-equiv="refresh" content="0; url=https://ghostmeter.app">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .container {
            text-align: center;
            padding: 40px;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
        }
        .ghost {
            font-size: 5rem;
            margin-bottom: 20px;
        }
        p {
            color: #a1a1aa;
            margin-bottom: 30px;
        }
        a {
            display: inline-block;
            background: linear-gradient(135deg, #a855f7, #6366f1);
            color: white;
            padding: 15px 40px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        a:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(168, 85, 247, 0.4);
        }
        .links {
            margin-top: 40px;
        }
        .links a {
            background: transparent;
            border: 2px solid #a855f7;
            padding: 10px 20px;
            margin: 5px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="ghost">👻</div>
        <h1>GhostMeter</h1>
        <p>Coach Relationnel - Analyse tes conversations avec l'IA</p>
        <a href="https://ghostmeter.app">Ouvrir l'application</a>

        <div class="links">
            <a href="privacy-policy.html">Politique de confidentialité</a>
        </div>
    </div>
</body>
</html>
